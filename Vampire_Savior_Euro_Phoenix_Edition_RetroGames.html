<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vampire Savior — RetroGames</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Centrado y responsivo */
    .wrap {
      width: 100%;
      height: 100vh;   /* fallback */
      height: 100dvh;  /* móviles */
      display: grid;
      place-items: center;
      background: #000;
    }

    /* 4:3 clásico (sin recortar; agrega barras negras si hace falta) */
    .frame {
      width: min(100vw, calc(100dvh * (4 / 3)));
      height: min(100dvh, calc(100vw * (3 / 4)));
      aspect-ratio: 4 / 3;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <iframe
        src="https://www.retrogames.cc/embed/10586-vampire-savior-the-lord-of-vampire-970519-euro-phoenix-edition-bootleg.html"
        frameborder="0"
        allow="fullscreen"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        scrolling="no">
      </iframe>
    </div>
  </div>
</body>
</html>
