<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marvel vs Capcom: Clash of Super Heroes — Casper Clean</title>
  <style>
    :root{
      --bg: #000;
      --panel: rgba(0,0,0,0.55);
      --panel-border: rgba(255,255,255,0.10);

      /* Altura base de la franja inferior (responsiva) */
      --bottom-mask-h: clamp(56px, 10vh, 88px);

      /* Intensidad de las franjas (scanlines) */
      --scanline-a: 0.05; /* blanco */
      --scanline-b: 0.08; /* negro */

      /* Sombra superior de la franja inferior */
      --mask-shadow-y: -6px;
      --mask-shadow-blur: 14px;
      --mask-shadow-alpha: 0.35;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Usa unidades modernas en móviles (evita el salto por barras del navegador) */
    .stage{
      position:relative;
      width:100%;
      height:100vh;   /* fallback */
      height:100dvh;  /* moderno */
      background:#000;
    }

    /* Barra superior minimalista (sin menú lateral) */
    .topbar{
      position:absolute;
      top: max(10px, env(safe-area-inset-top, 0px));
      left: max(10px, env(safe-area-inset-left, 0px));
      right: max(10px, env(safe-area-inset-right, 0px));
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      pointer-events:none; /* para no estorbar al juego si se superpone */
    }

    .topbar .badge{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 10px 12px;
      border:1px solid var(--panel-border);
      background:var(--panel);
      border-radius:12px;
      backdrop-filter: blur(6px);
      max-width: min(72vw, 720px);
    }

    .topbar .title{
      font-weight:800;
      letter-spacing:0.06em;
      font-size: clamp(11px, 1.6vw, 12px);
      opacity:0.95;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .topbar button{
      pointer-events:auto;
      cursor:pointer;
      border:1px solid var(--panel-border);
      background:rgba(0,0,0,0.65);
      color:#fff;
      padding: 10px 12px;
      min-height: 44px; /* tap target móvil */
      border-radius:12px;
      font-weight:800;
      letter-spacing:0.04em;
      text-transform:uppercase;
      font-size: clamp(11px, 1.8vw, 12px);
      white-space:nowrap;
    }
    .topbar button:hover{ background:rgba(0,0,0,0.8); }
    .topbar button:active{ transform: translateY(1px); }

    /* Marco CRT */
    .crt{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:#000;
    }

    /* Iframe del juego */
    #gameFrame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
      z-index:1;
    }

    /* Franjas tipo CRT (encima de todo) */
    .crt::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,var(--scanline-a)) 0px,
          rgba(255,255,255,var(--scanline-a)) 1px,
          rgba(0,0,0,var(--scanline-b)) 2px,
          rgba(0,0,0,var(--scanline-b)) 3px
        );
      mix-blend-mode: overlay;
    }

    /* Viñeta suave */
    .crt::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:9;
      pointer-events:none;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0) 55%,
        rgba(0,0,0,0.25) 75%,
        rgba(0,0,0,0.55) 100%);
    }

    /* Franja inferior para ocultar logo/botón/elementos del embed */
    .bottom-mask{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height: calc(var(--bottom-mask-h) + env(safe-area-inset-bottom, 0px));
      z-index:7;

      /* Negro sólido con leve degradado hacia arriba */
      background: linear-gradient(0deg,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 70%,
        rgba(0,0,0,0.88) 100%);

      /* Sombra hacia arriba para “integrar” */
      box-shadow: 0 var(--mask-shadow-y) var(--mask-shadow-blur) rgba(0,0,0,var(--mask-shadow-alpha));

      /* auto: bloquea clics en esa zona (útil si hay botones/branding ocultos) */
      pointer-events: auto;
    }

    /* === Mobile ultra clean: oculta el título y deja SOLO el botón === */
    @media (max-width: 520px){
      .topbar{
        justify-content:flex-end;
      }
      .topbar .badge{
        display:none;
      }
    }

    /* Ajustes extra para pantallas muy angostas */
    @media (max-width: 420px){
      :root{
        --scanline-a: 0.04;
        --scanline-b: 0.07;
      }
      .topbar{ gap:8px; }
    }

    /* Ajustes para landscape en móviles (altura corta) */
    @media (max-height: 520px){
      :root{ --bottom-mask-h: clamp(44px, 12vh, 70px); }
      .topbar{ top: max(6px, env(safe-area-inset-top, 0px)); }
      .topbar button{ padding: 8px 10px; min-height: 40px; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="topbar">
      <div class="badge">
        <div class="title">Marvel vs Capcom: Clash of Super Heroes</div>
      </div>
      <button id="fsBtn" type="button" aria-label="Pantalla completa">Fullscreen</button>
    </div>

    <div class="crt">
      <iframe
        id="gameFrame"
        src="https://www.minijuegos.mx/embed/marvel-vs-capcom-clash-of-super-heroes"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>

      <div class="bottom-mask" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const fsBtn = document.getElementById('fsBtn');

    function isFullscreen(){
      return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
    }

    async function toggleFullscreen(){
      try{
        if(!isFullscreen()){
          if(stage.requestFullscreen) await stage.requestFullscreen();
          else if(stage.webkitRequestFullscreen) await stage.webkitRequestFullscreen();
          else if(stage.mozRequestFullScreen) await stage.mozRequestFullScreen();
          else if(stage.msRequestFullscreen) await stage.msRequestFullscreen();
        }else{
          if(document.exitFullscreen) await document.exitFullscreen();
          else if(document.webkitExitFullscreen) await document.webkitExitFullscreen();
          else if(document.mozCancelFullScreen) await document.mozCancelFullScreen();
          else if(document.msExitFullscreen) await document.msExitFullscreen();
        }
      }catch(e){
        console.warn('Fullscreen error:', e);
      }
    }

    function syncFsLabel(){
      fsBtn.textContent = isFullscreen() ? 'Exit Fullscreen' : 'Fullscreen';
    }

    fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', syncFsLabel);
    document.addEventListener('webkitfullscreenchange', syncFsLabel);

    syncFsLabel();
  </script>
</body>
</html>
