<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Series</title>
  <style>
    :root{
      --bg: #000;
      --panel: rgba(15, 15, 15, 0.74);
      --text: #f3f3f3;
      --muted: #b9b9b9;
      --accent: #00d4ff;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 0 25px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .menu-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1200;
      width: 52px;
      height: 52px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(20, 20, 20, 0.78);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .menu-toggle:hover {
      transform: scale(1.05);
      background: rgba(35, 35, 35, 0.9);
      border-color: rgba(255,255,255,0.24);
    }

    .menu-toggle span {
      font-size: 24px;
      line-height: 1;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      max-width: 88vw;
      height: 100vh;
      z-index: 1100;
      background: var(--panel);
      border-right: 1px solid var(--border);
      box-shadow: 10px 0 35px rgba(0,0,0,.38);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transform: translateX(-100%);
      transition: transform .28s ease;
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 20px 18px 16px 88px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      min-height: 96px;
    }

    .sidebar-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .sidebar-subtitle {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    .chapter-list {
      list-style: none;
      padding: 14px;
      overflow-y: auto;
      flex: 1;
    }

    .chapter-list::-webkit-scrollbar {
      width: 10px;
    }

    .chapter-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
    }

    .chapter-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    .chapter-item {
      margin-bottom: 10px;
    }

    .chapter-button {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 14px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease, transform .2s ease;
    }

    .chapter-button:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.16);
      transform: translateX(2px);
    }

    .chapter-button.active {
      background: rgba(0, 212, 255, 0.16);
      border-color: rgba(0, 212, 255, 0.42);
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.1) inset;
    }

    .chapter-button.disabled {
      opacity: 0.62;
    }

    .chapter-name {
      font-size: 15px;
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    .chapter-note {
      font-size: 12px;
      color: var(--muted);
      display: block;
      line-height: 1.35;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1050;
      background: rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .page {
      width: 100%;
      max-width: 1120px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 48px);
    }

    .player-wrapper {
      width: 100%;
    }

    .player-card {
      width: 100%;
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .player-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .player-title {
      font-size: 18px;
      font-weight: bold;
    }

    .player-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-button {
      min-width: 110px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease, opacity .2s ease;
    }

    .nav-button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.24);
    }

    .nav-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .video-stage {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16 / 9;
      min-height: 240px;
    }

    .video-stage > div,
    .video-stage iframe {
      width: 100% !important;
      height: 100% !important;
      border: 0 !important;
      display: block !important;
    }

    .help-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
      color: #fff;
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .menu-toggle {
        top: 12px;
        left: 12px;
        width: 48px;
        height: 48px;
      }

      .sidebar-header {
        padding: 18px 16px 14px 78px;
        min-height: 88px;
      }

      .player-topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .player-title {
        font-size: 16px;
      }

      .player-nav {
        width: 100%;
      }

      .nav-button {
        flex: 1 1 calc(50% - 5px);
        min-width: 0;
      }
    }
  </style>
</head>

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const menuToggle = document.getElementById("menuToggle");
    const chapterList = document.getElementById("chapterList");
    const currentTitle = document.getElementById("currentTitle");
    const playerHost = document.getElementById("playerHost");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    let activeIndex = 0;

    function toggleMenu(forceOpen) {
      const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : !sidebar.classList.contains("open");
      sidebar.classList.toggle("open", shouldOpen);
      overlay.classList.toggle("show", shouldOpen);
    }

    function closeMenuOnMobile() {
      if (window.innerWidth <= 1024) {
        toggleMenu(false);
      }
    }

    function isPlayable(index) {
      return index >= 0 && index < episodes.length && !String(episodes[index].video).includes("REEMPLAZA_");
    }

    function getPreviousPlayableIndex(index) {
      for (let i = index - 1; i >= 0; i--) {
        if (isPlayable(i)) return i;
      }
      return -1;
    }

    function getNextPlayableIndex(index) {
      for (let i = index + 1; i < episodes.length; i++) {
        if (isPlayable(i)) return i;
      }
      return -1;
    }

    function updateNavButtons() {
      prevButton.disabled = getPreviousPlayableIndex(activeIndex) === -1;
      nextButton.disabled = getNextPlayableIndex(activeIndex) === -1;
    }

    function goToEpisode(index) {
      if (!isPlayable(index)) return;
      activeIndex = index;
      renderMenu();
      loadEpisode(episodes[index]);
      updateNavButtons();
    }

    menuToggle.addEventListener("click", () => toggleMenu());
    overlay.addEventListener("click", () => toggleMenu(false));

    prevButton.addEventListener("click", () => {
      const prevIndex = getPreviousPlayableIndex(activeIndex);
      if (prevIndex !== -1) {
        goToEpisode(prevIndex);
      }
    });

    nextButton.addEventListener("click", () => {
      const nextIndex = getNextPlayableIndex(activeIndex);
      if (nextIndex !== -1) {
        goToEpisode(nextIndex);
      }
    });

    function renderMenu() {
      chapterList.innerHTML = "";
      episodes.forEach((episode, index) => {
        const li = document.createElement("li");
        li.className = "chapter-item";

        const btn = document.createElement("button");
        const isPlaceholder = !isPlayable(index);
        btn.className = "chapter-button" + (index === activeIndex ? " active" : "") + (isPlaceholder ? " disabled" : "");
        btn.type = "button";

        btn.innerHTML = `
          <span class="chapter-name">${episode.title}</span>
          <span class="chapter-note">${episode.note || ""}</span>
        `;

        btn.addEventListener("click", () => {
          if (isPlaceholder) {
            alert("Este capítulo es un ejemplo. Reemplaza el ID de video en el arreglo 'episodes' del HTML.");
            return;
          }
          goToEpisode(index);
          closeMenuOnMobile();
        });

        li.appendChild(btn);
        chapterList.appendChild(li);
      });
    }

    function loadEpisode(episode) {
      currentTitle.textContent = episode.title;
      playerHost.innerHTML = '<div id="rumble_player"></div>';

      if (typeof window.Rumble === "function") {
        try {
          window.Rumble("play", {
            video: episode.video,
            div: "rumble_player"
          });
        } catch (error) {
          playerHost.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100%;padding:24px;color:#fff;text-align:center;">
              No se pudo cargar el video. Verifica el ID de Rumble.
            </div>
          `;
          console.error(error);
        }
      }
    }

    renderMenu();
    updateNavButtons();
    loadEpisode(episodes[0]);
  </script>
</body>
</html>
