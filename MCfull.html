<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marvel vs Capcom — RetroGames</title>
  <style>
    html, body {
      margin:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      -webkit-tap-highlight-color: transparent;
    }

    /* Contenedor centrado y responsivo */
    .wrap {
      width:100%;
      height:100vh;   /* fallback */
      height:100dvh;  /* móviles */
      display:grid;
      place-items:center;
      background:#000;
      position: relative;
    }

    /* Mantiene proporción 4:3 y nunca recorta (letterbox si hace falta) */
    .frame {
      width: min(100vw, calc(100dvh * (4 / 3)));
      height: min(100dvh, calc(100vw * (3 / 4)));
      aspect-ratio: 4 / 3;
      background:#000;
      position:relative;
      overflow:hidden;
    }

    iframe {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    /* ====== CRT overlay (opcional). No altera el iframe. ====== */
    body::before {
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          rgba(0,0,0,0.08) 2px,
          rgba(0,0,0,0.08) 3px
        );
      mix-blend-mode: overlay;
    }
    body::after {
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0) 55%,
        rgba(0,0,0,0.25) 75%,
        rgba(0,0,0,0.55) 100%);
    }

    /* ====== Fullscreen helper ====== */
    .fs-overlay {
      position: absolute;
      inset: 0;
      z-index: 10000;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(0,0,0,0.40), rgba(0,0,0,0.88));
    }

    .fs-card {
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      text-align:center;
      padding:16px 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.65);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      max-width: min(92vw, 520px);
    }

    .fs-card strong {
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .fs-card p {
      margin:0;
      font-size: 13px;
      opacity: 0.9;
      line-height: 1.35;
    }

    .fs-btn {
      cursor:pointer;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color:#fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      min-height: 44px; /* tap target móvil */
    }
    .fs-btn:hover { background: rgba(255,255,255,0.10); }
    .fs-btn:active { transform: translateY(1px); }

    .mini-note {
      font-size: 12px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="wrap" id="stage">
    <div class="frame">
      <iframe
        src="https://www.retrogames.cc/embed/9113-marvel-vs-capcom-clash-of-super-heroes-980112-asia.html"
        frameborder="0"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        scrolling="no">
      </iframe>
    </div>

    <!-- Fullscreen no puede ser automático sin interacción del usuario -->
    <div class="fs-overlay" id="fsOverlay">
      <div class="fs-card">
        <strong>Entrar a fullscreen</strong>
        <p>Los navegadores bloquean el fullscreen automático. Toca el botón para activar pantalla completa.</p>
        <button class="fs-btn" id="fsBtn" type="button">Fullscreen</button>
        <div class="mini-note">Tip: en iPhone/Safari puede no funcionar fullscreen para iframes.</div>
      </div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const fsOverlay = document.getElementById('fsOverlay');
    const fsBtn = document.getElementById('fsBtn');

    function isFullscreen() {
      return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
    }

    async function requestFs() {
      try {
        if (!isFullscreen()) {
          if (stage.requestFullscreen) await stage.requestFullscreen();
          else if (stage.webkitRequestFullscreen) await stage.webkitRequestFullscreen();
          else if (stage.mozRequestFullScreen) await stage.mozRequestFullScreen();
          else if (stage.msRequestFullscreen) await stage.msRequestFullscreen();
        }
      } catch (e) {
        console.warn('Fullscreen error:', e);
        return;
      }
      if (isFullscreen()) fsOverlay.style.display = 'none';
    }

    fsBtn.addEventListener('click', requestFs);

    // Tap en el overlay también intenta (además del botón)
    fsOverlay.addEventListener('click', (e) => {
      if (e.target === fsBtn) return;
      requestFs();
    });

    function onFsChange() {
      fsOverlay.style.display = isFullscreen() ? 'none' : 'grid';
    }
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);
  </script>
</body>
</html>
