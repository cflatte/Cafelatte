<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>International Superstar Soccer 98 — Casper Clean</title>
  <style>
    :root{
      --bg: #000;
      --panel: rgba(0,0,0,0.55);
      --panel-border: rgba(255,255,255,0.10);

      /* Altura de la franja inferior (ajústala a gusto) */
      --bottom-mask-h: 78px;

      /* Intensidad de las franjas (scanlines) */
      --scanline-a: 0.05; /* blanco */
      --scanline-b: 0.08; /* negro */

      /* Sombra superior de la franja inferior */
      --mask-shadow-y: -6px;
      --mask-shadow-blur: 14px;
      --mask-shadow-alpha: 0.35;
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      background:var(--bg);
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
    }

    /* Contenedor principal (es el que se pone en fullscreen) */
    .stage{
      position:relative;
      width:100%;
      height:100%;
      background:#000;
    }

    /* Barra superior minimalista (sin menú lateral) */
    .topbar{
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      pointer-events:none; /* para no estorbar al juego si se superpone */
    }
    .topbar .badge{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 10px;
      border:1px solid var(--panel-border);
      background:var(--panel);
      border-radius:12px;
      backdrop-filter: blur(6px);
    }
    .topbar .title{
      font-weight:700;
      letter-spacing:0.06em;
      font-size:12px;
      opacity:0.95;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .topbar button{
      pointer-events:auto;
      cursor:pointer;
      border:1px solid var(--panel-border);
      background:rgba(0,0,0,0.65);
      color:#fff;
      padding:8px 10px;
      border-radius:10px;
      font-weight:700;
      letter-spacing:0.04em;
      text-transform:uppercase;
      font-size:12px;
    }
    .topbar button:hover{ background:rgba(0,0,0,0.8); }
    .topbar button:active{ transform: translateY(1px); }

    /* Marco CRT */
    .crt{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:#000;
    }

    /* Iframe del juego */
    #gameFrame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
      z-index:1;
    }

    /* Franjas tipo CRT (encima de todo) */
    .crt::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,var(--scanline-a)) 0px,
          rgba(255,255,255,var(--scanline-a)) 1px,
          rgba(0,0,0,var(--scanline-b)) 2px,
          rgba(0,0,0,var(--scanline-b)) 3px
        );
      mix-blend-mode: overlay;
    }

    /* Viñeta suave */
    .crt::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:9;
      pointer-events:none;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0) 55%,
        rgba(0,0,0,0.25) 75%,
        rgba(0,0,0,0.55) 100%);
    }

    /* Franja inferior para ocultar logo/botón/elementos del embed */
    .bottom-mask{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:var(--bottom-mask-h);
      z-index:7;

      /* Negro sólido con leve degradado hacia arriba */
      background: linear-gradient(0deg,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 70%,
        rgba(0,0,0,0.88) 100%);

      /* Sombra hacia arriba para “integrar” */
      box-shadow: 0 var(--mask-shadow-y) var(--mask-shadow-blur) rgba(0,0,0,var(--mask-shadow-alpha));

      /* IMPORTANTE:
         - auto: bloquea clics en esa zona (útil si hay botones/branding ocultos)
         - none: deja pasar clics al juego (útil si el HUD del juego está abajo)
      */
      pointer-events: none;
    }

    /* Mensaje opcional (cuando algo falla) */
    .hint{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:15;
      max-width:min(560px, 92vw);
      padding:14px 16px;
      border:1px solid var(--panel-border);
      background:rgba(0,0,0,0.72);
      border-radius:14px;
      backdrop-filter: blur(6px);
      display:none;
    }
    .hint strong{ display:block; margin-bottom:6px; }
    .hint code{
      display:block;
      margin-top:8px;
      padding:10px;
      background:rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:10px;
      overflow:auto;
      color:#7ef9ff;
      font-size:12px;
    }

    /* En pantallas muy pequeñas, baja un poco la franja */
    @media (max-height: 650px){
      :root{ --bottom-mask-h: 64px; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="topbar">
      <div class="badge">
        <div class="title">International Superstar Soccer 98</div>
      </div>
      <button id="fsBtn" type="button" aria-label="Pantalla completa">Fullscreen</button>
    </div>

    <div class="crt" id="crt">
      <iframe
        id="gameFrame"
        src="https://www.minijuegos.mx/embed/international-superstar-soccer-98"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>

      <div class="bottom-mask" aria-hidden="true"></div>

      <div class="hint" id="hint">
        <strong>No se pudo cargar el juego dentro del iframe.</strong>
        Esto suele pasar si el sitio bloquea el embebido (CSP / X-Frame-Options).
        <code id="hintUrl"></code>
      </div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const fsBtn = document.getElementById('fsBtn');
    const frame = document.getElementById('gameFrame');
    const hint = document.getElementById('hint');
    const hintUrl = document.getElementById('hintUrl');

    function isFullscreen(){
      return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
    }

    async function toggleFullscreen(){
      try{
        if(!isFullscreen()){
          if(stage.requestFullscreen) await stage.requestFullscreen();
          else if(stage.webkitRequestFullscreen) await stage.webkitRequestFullscreen();
          else if(stage.mozRequestFullScreen) await stage.mozRequestFullScreen();
          else if(stage.msRequestFullscreen) await stage.msRequestFullscreen();
        }else{
          if(document.exitFullscreen) await document.exitFullscreen();
          else if(document.webkitExitFullscreen) await document.webkitExitFullscreen();
          else if(document.mozCancelFullScreen) await document.mozCancelFullScreen();
          else if(document.msExitFullscreen) await document.msExitFullscreen();
        }
      }catch(e){
        console.warn('Fullscreen error:', e);
      }
    }

    function syncFsLabel(){
      fsBtn.textContent = isFullscreen() ? 'Exit Fullscreen' : 'Fullscreen';
    }

    fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', syncFsLabel);
    document.addEventListener('webkitfullscreenchange', syncFsLabel);

    // Si el iframe falla, mostramos una pista (no siempre se dispara)
    frame.addEventListener('error', () => {
      hint.style.display = 'block';
      hintUrl.textContent = frame.src;
    });

    syncFsLabel();
  </script>
</body>
</html>
