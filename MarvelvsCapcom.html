<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marvel vs Capcom — RetroGames</title>
  <style>
    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
    }

    /* Contenedor centrado y responsivo */
    .wrap{
      width:100%;
      height:100vh;   /* fallback */
      height:100dvh;  /* móviles */
      display:grid;
      place-items:center;
      background:#000;
    }

    /* Mantiene proporción 4:3 y nunca recorta (letterbox si hace falta) */
    .frame{
      width: min(100vw, calc(100dvh * (4 / 3)));
      height: min(100dvh, calc(100vw * (3 / 4)));
      aspect-ratio: 4 / 3;
      background:#000;
      position:relative;
      overflow:hidden;
    }

    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <iframe
        src="https://www.retrogames.cc/embed/9113-marvel-vs-capcom-clash-of-super-heroes-980112-asia.html"
        frameborder="0"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        scrolling="no">
      </iframe>
    </div>
  </div>
</body>
</html>
