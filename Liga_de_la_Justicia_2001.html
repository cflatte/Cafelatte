<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0%'%20stop-color='%23ffdf6b'/%3E%3Cstop%20offset='100%'%20stop-color='%23f1b81e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath%20d='M32%204%2056%2012%2052%2034%2032%2058%2012%2034%208%2012Z'%20fill='%23c8102e'%20stroke='url(%23g)'%20stroke-width='4'%20stroke-linejoin='round'/%3E%3Cpath%20d='M21%2019c3-3%208-5%2015-4%204%201%208%202%2010%204l-4%205c-2-2-5-3-8-3-3%200-5%201-6%202-1%201-1%202%201%203%202%201%205%201%208%202%207%202%209%206%206%2011-3%204-8%206-15%205-4%200-9-2-12-5l4-5c3%203%206%204%2010%204%204%200%206-1%207-2%202-2%201-3-2-4-3-1-6-1-9-2-6-2-7-6-5-10Z'%20fill='url(%23g)'/%3E%3C/svg%3E" />
  <title>Liga de la Justicia (2001)</title>
  <style>
    :root{
      --bg: #050814;
      --bg2: #0b1530;
      --panel: rgba(10, 18, 40, 0.84);
      --panel-strong: rgba(15, 28, 60, 0.92);
      --text: #f5f7ff;
      --muted: #c8d3f0;
      --accent: #f5c542;
      --accent-2: #69b7ff;
      --border: rgba(255,255,255,0.14);
      --shadow: 0 0 30px rgba(0, 0, 0, 0.45);
      --glow: 0 0 22px rgba(245, 197, 66, 0.18);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(105,183,255,0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(245,197,66,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 85%);
      opacity: 0.22;
    }
    .menu-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1200;
      width: 54px;
      height: 54px;
      border: 1px solid rgba(245,197,66,0.35);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17,28,58,0.95), rgba(8,15,34,0.92));
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow), var(--glow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .menu-toggle:hover {
      transform: scale(1.05);
      background: linear-gradient(180deg, rgba(27,42,84,1), rgba(10,18,40,0.96));
      border-color: rgba(245,197,66,0.6);
      box-shadow: var(--shadow), 0 0 28px rgba(105,183,255,0.18);
    }
    .menu-toggle span {
      font-size: 24px;
      line-height: 1;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 340px;
      max-width: 88vw;
      height: 100vh;
      z-index: 1100;
      background: linear-gradient(180deg, rgba(14,26,57,0.96), rgba(7,13,30,0.96));
      border-right: 1px solid rgba(245,197,66,0.18);
      box-shadow: 10px 0 40px rgba(0,0,0,.44);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transform: translateX(-100%);
      transition: transform .28s ease;
      display: flex;
      flex-direction: column;
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-header {
      padding: 22px 18px 16px 88px;
      border-bottom: 1px solid rgba(245,197,66,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      min-height: 108px;
      position: relative;
    }
    .sidebar-header::before {
      content: "JL";
      position: absolute;
      left: 22px;
      top: 18px;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      letter-spacing: 1px;
      color: #0a1022;
      background: linear-gradient(180deg, #ffd86b, #e7b52a);
      box-shadow: 0 0 24px rgba(245,197,66,0.24);
    }
    .sidebar-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .sidebar-subtitle {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
      letter-spacing: .8px;
    }
    .chapter-list {
      list-style: none;
      padding: 14px;
      overflow-y: auto;
      flex: 1;
    }
    .chapter-list::-webkit-scrollbar {
      width: 10px;
    }
    .chapter-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
    }
    .chapter-list::-webkit-scrollbar-thumb {
      background: rgba(245,197,66,0.28);
      border-radius: 999px;
    }
    .chapter-item {
      margin-bottom: 10px;
    }
    .chapter-button {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      color: var(--text);
      padding: 14px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease, transform .2s ease, box-shadow .2s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    .chapter-button:hover {
      background: linear-gradient(180deg, rgba(105,183,255,0.12), rgba(255,255,255,0.05));
      border-color: rgba(105,183,255,0.28);
      transform: translateX(2px);
      box-shadow: 0 0 16px rgba(105,183,255,0.08);
    }
    .chapter-button.active {
      background: linear-gradient(180deg, rgba(245,197,66,0.18), rgba(105,183,255,0.14));
      border-color: rgba(245,197,66,0.48);
      box-shadow: 0 0 0 1px rgba(245,197,66,0.12) inset, 0 0 18px rgba(245,197,66,0.12);
    }
    .chapter-name {
      font-size: 15px;
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    .chapter-note {
      font-size: 12px;
      color: var(--muted);
      display: block;
      line-height: 1.35;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1050;
      background: rgba(2,6,16,0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }
    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .page {
      width: 100%;
      max-width: 1180px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 48px);
      padding-top: 34px;
    }
    .player-wrapper {
      width: 100%;
    }
    .player-card {
      width: 100%;
      background: linear-gradient(180deg, rgba(10,18,40,0.96), rgba(7,12,26,0.98));
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow), var(--glow);
      border: 1px solid rgba(245,197,66,0.18);
      position: relative;
    }
    .player-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(105,183,255,0.08), transparent 35%, rgba(245,197,66,0.08));
    }
    .player-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 20px 16px 76px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border-bottom: 1px solid rgba(245,197,66,0.12);
      position: relative;
      z-index: 1;
    }
    .player-title {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: .4px;
      text-shadow: 0 0 14px rgba(105,183,255,0.18);
    }
    .player-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav-button {
      min-width: 118px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(245,197,66,0.22);
      background: linear-gradient(180deg, rgba(19,31,66,0.92), rgba(11,18,38,0.92));
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease, opacity .2s ease, box-shadow .2s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    .nav-button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(33,53,103,0.96), rgba(12,20,42,0.96));
      border-color: rgba(105,183,255,0.36);
      box-shadow: 0 0 16px rgba(105,183,255,0.10);
    }
    .nav-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .video-stage {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16 / 9;
      min-height: 240px;
      z-index: 1;
    }
    .video-stage iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    @media (max-width: 768px) {
      body { padding: 16px; }
      .menu-toggle {
        top: 12px;
        left: 12px;
        width: 48px;
        height: 48px;
      }
      .sidebar-header {
        padding: 18px 16px 14px 78px;
        min-height: 92px;
      }
      .sidebar-header::before {
        left: 16px;
        top: 16px;
        width: 42px;
        height: 42px;
      }
      .page {
        padding-top: 22px;
      }
      .player-topbar {
        flex-direction: column;
        align-items: flex-start;
        padding: 16px 16px 14px 16px;
      }
      .player-title { font-size: 16px; }
      .player-nav { width: 100%; }
      .nav-button {
        flex: 1 1 calc(50% - 5px);
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú de capítulos" title="Abrir menú">
    <span>☰</span>
  </button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Capítulos</div>
      <div class="sidebar-subtitle">LIGA DE LA JUSTICIA (2001)</div>
    </div>
    <ul class="chapter-list" id="chapterList"></ul>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="page">
    <section class="player-wrapper">
      <div class="player-card">
        <div class="player-topbar">
          <div class="player-title" id="currentTitle">Capítulo 1</div>
          <div class="player-nav">
            <button class="nav-button" id="prevButton" type="button">Anterior</button>
            <button class="nav-button" id="nextButton" type="button">Siguiente</button>
          </div>
        </div>
        <div class="video-stage" id="playerHost"></div>
      </div>
    </section>
  </main>

  <script>
    const episodes = [
      { title: "Capítulo 1", note: "Temporada 1", src: "https://rumble.com/embed/v7671h0/?pub=4p2guc" },
      { title: "Capítulo 2", note: "Temporada 1", src: "https://rumble.com/embed/v7671kq/?pub=4p2guc" },
      { title: "Capítulo 3", note: "Temporada 1", src: "https://rumble.com/embed/v7671m4/?pub=4p2guc" },
      { title: "Capítulo 4", note: "Temporada 1", src: "https://rumble.com/embed/v7671nk/?pub=4p2guc" },
      { title: "Capítulo 5", note: "Temporada 1", src: "https://rumble.com/embed/v7672ic/?pub=4p2guc" },
      { title: "Capítulo 6", note: "Temporada 1", src: "https://rumble.com/embed/v7672ko/?pub=4p2guc" },
      { title: "Capítulo 7", note: "Temporada 1", src: "https://rumble.com/embed/v7672lk/?pub=4p2guc" },
      { title: "Capítulo 8", note: "Temporada 1", src: "https://rumble.com/embed/v7672mw/?pub=4p2guc" },
      { title: "Capítulo 9", note: "Temporada 1", src: "https://rumble.com/embed/v7672ny/?pub=4p2guc" },
      { title: "Capítulo 10", note: "Temporada 1", src: "https://rumble.com/embed/v7672oy/?pub=4p2guc" },
      { title: "Capítulo 11", note: "Temporada 1", src: "https://rumble.com/embed/v7672qa/?pub=4p2guc" },
      { title: "Capítulo 12", note: "Temporada 1", src: "https://rumble.com/embed/v7672qu/?pub=4p2guc" },
      { title: "Capítulo 13", note: "Temporada 1", src: "https://rumble.com/embed/v7672rm/?pub=4p2guc" },
      { title: "Capítulo 14", note: "Temporada 1", src: "https://rumble.com/embed/v7672ss/?pub=4p2guc" },
      { title: "Capítulo 15", note: "Temporada 1", src: "https://rumble.com/embed/v7672ti/?pub=4p2guc" },
      { title: "Capítulo 16", note: "Temporada 1", src: "https://rumble.com/embed/v7672ua/?pub=4p2guc" },
      { title: "Capítulo 17", note: "Temporada 1", src: "https://rumble.com/embed/v7672ve/?pub=4p2guc" },
      { title: "Capítulo 18", note: "Temporada 1", src: "https://rumble.com/embed/v7672ww/?pub=4p2guc" },
      { title: "Capítulo 19", note: "Temporada 1", src: "https://rumble.com/embed/v7672yu/?pub=4p2guc" },
      { title: "Capítulo 20", note: "Temporada 1", src: "https://rumble.com/embed/v7672zy/?pub=4p2guc" },
      { title: "Capítulo 21", note: "Temporada 1", src: "https://rumble.com/embed/v76732o/?pub=4p2guc" },
      { title: "Capítulo 22", note: "Temporada 1", src: "https://rumble.com/embed/v76733y/?pub=4p2guc" },
      { title: "Capítulo 23", note: "Temporada 1", src: "https://rumble.com/embed/v76735e/?pub=4p2guc" },
      { title: "Capítulo 24", note: "Temporada 1", src: "https://rumble.com/embed/v76737c/?pub=4p2guc" },
      { title: "Capítulo 25", note: "Temporada 1", src: "https://rumble.com/embed/v76738s/?pub=4p2guc" },
      { title: "Capítulo 26", note: "Temporada 1", src: "https://rumble.com/embed/v76739y/?pub=4p2guc" },
      { title: "Capítulo 01", note: "Temporada 2", src: "https://rumble.com/embed/v7673bm/?pub=4p2guc" },
      { title: "Capítulo 02", note: "Temporada 2", src: "https://rumble.com/embed/v7673dg/?pub=4p2guc" },
      { title: "Capítulo 03", note: "Temporada 2", src: "https://rumble.com/embed/v7673eo/?pub=4p2guc" },
      { title: "Capítulo 04", note: "Temporada 2", src: "https://rumble.com/embed/v7673g8/?pub=4p2guc" },
      { title: "Capítulo 05", note: "Temporada 2", src: "https://rumble.com/embed/v7673r8/?pub=4p2guc" },
      { title: "Capítulo 06", note: "Temporada 2", src: "https://rumble.com/embed/v7673sg/?pub=4p2guc" },
      { title: "Capítulo 07", note: "Temporada 2", src: "https://rumble.com/embed/v7673u0/?pub=4p2guc" },
      { title: "Capítulo 08", note: "Temporada 2", src: "https://rumble.com/embed/v7673ve/?pub=4p2guc" },
      { title: "Capítulo 24", note: "Temporada 2", src: "https://rumble.com/embed/v7673wo/?pub=4p2guc" },
      { title: "Capítulo 25", note: "Temporada 2", src: "https://rumble.com/embed/v7673xi/?pub=4p2guc" },
      { title: "Capítulo 26", note: "Temporada 2", src: "https://rumble.com/embed/v7673yi/?pub=4p2guc" }
    ];

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const menuToggle = document.getElementById("menuToggle");
    const chapterList = document.getElementById("chapterList");
    const currentTitle = document.getElementById("currentTitle");
    const playerHost = document.getElementById("playerHost");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    let activeIndex = 0;

    function toggleMenu(forceOpen) {
      const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : !sidebar.classList.contains("open");
      sidebar.classList.toggle("open", shouldOpen);
      overlay.classList.toggle("show", shouldOpen);
    }

    function closeMenuOnMobile() {
      if (window.innerWidth <= 1024) {
        toggleMenu(false);
      }
    }

    function getPreviousIndex(index) {
      return index > 0 ? index - 1 : -1;
    }

    function getNextIndex(index) {
      return index < episodes.length - 1 ? index + 1 : -1;
    }

    function updateNavButtons() {
      prevButton.disabled = getPreviousIndex(activeIndex) === -1;
      nextButton.disabled = getNextIndex(activeIndex) === -1;
    }

    function goToEpisode(index) {
      if (index < 0 || index >= episodes.length) return;
      activeIndex = index;
      renderMenu();
      loadEpisode(episodes[index]);
      updateNavButtons();
    }

    menuToggle.addEventListener("click", () => toggleMenu());
    overlay.addEventListener("click", () => toggleMenu(false));

    prevButton.addEventListener("click", () => {
      const prevIndex = getPreviousIndex(activeIndex);
      if (prevIndex !== -1) {
        goToEpisode(prevIndex);
      }
    });

    nextButton.addEventListener("click", () => {
      const nextIndex = getNextIndex(activeIndex);
      if (nextIndex !== -1) {
        goToEpisode(nextIndex);
      }
    });

    function renderMenu() {
      chapterList.innerHTML = "";
      episodes.forEach((episode, index) => {
        const li = document.createElement("li");
        li.className = "chapter-item";

        const btn = document.createElement("button");
        btn.className = "chapter-button" + (index === activeIndex ? " active" : "");
        btn.type = "button";

        btn.innerHTML = `
          <span class="chapter-name">${episode.title}</span>
          <span class="chapter-note">${episode.note}</span>
        `;

        btn.addEventListener("click", () => {
          goToEpisode(index);
          closeMenuOnMobile();
        });

        li.appendChild(btn);
        chapterList.appendChild(li);
      });
    }

    function loadEpisode(episode) {
      currentTitle.textContent = `${episode.title} · ${episode.note}`;
      playerHost.innerHTML = `
        <iframe
          src="${episode.src}"
          frameborder="0"
          allow="autoplay"
          allowfullscreen>
        </iframe>
      `;
    }

    renderMenu();
    updateNavButtons();
    loadEpisode(episodes[0]);
  </script>
</body>
</html>
